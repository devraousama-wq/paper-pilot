services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  paperpilot:
    build: .
    ports:
      - "8800:8800"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - ollama

volumes:
  ollama_data:
